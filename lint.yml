name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install ruff
      - run: ruff check configs scripts

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: parse all python files
        run: |
          python - <<'EOF'
          import ast, pathlib, sys
          failed = False
          for p in pathlib.Path('.').rglob('*.py'):
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  print(f"FAIL {p}: {e}")
                  failed = True
          if failed:
              sys.exit(1)
          print("all python files parse")
          EOF
